#===============================================================================
# Basic Configuration
#===============================================================================

# Supported images

#MACHINE  = "luckfox-lyra-plus"
#MACHINE = "luckfox-lyra-ultra"
#MACHINE = "luckfox-lyra-pi-b-w"
MACHINE  = "luckfox-lyra-pi"

CONF_VERSION = "2"

DISTRO  = "magnesium"

# Uncomment if you want deterministic downloads/sstate outside the build dir
# DL_DIR        = "${TOPDIR}/downloads"
# SSTATE_DIR    = "${TOPDIR}/sstate-cache"

#===============================================================================
# Performance / Disk Space Optimizations
#===============================================================================

# Remove work directories (keeps only image artifacts)
INHERIT += "rm_work"

# Don't generate debug symbol packages
PACKAGE_DEBUG_SPLIT_STYLE = "none"
INHIBIT_PACKAGE_DEBUG_SPLIT = "1"
INHIBIT_PACKAGE_STRIP = "0"

# Disable build history
INHERIT:remove = "buildhistory"

# OPTIONAL: Lower SSD usage drastically (but slower builds)
# INHERIT += "icecc"
# BB_NUMBER_THREADS ?= "4"
# PARALLEL_MAKE ?= "-j4"

#===============================================================================
# Distro / License
#===============================================================================

ACCEPT_FSL_EULA = "1"
LICENSE_FLAGS_ACCEPTED += "commercial"

#===============================================================================
# Miscellaneous
#===============================================================================

# Empty the REPRODUCIBLE_TIMESTAMP_ROOTFS variable, otherwise
# the /etc/version becames a fixed value of "20180309123456" (instead of the BUILDNAME).
# This seems to be a bug in the newer yocto versions.
REPRODUCIBLE_TIMESTAMP_ROOTFS = ""
