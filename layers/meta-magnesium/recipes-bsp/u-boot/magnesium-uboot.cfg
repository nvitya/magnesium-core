# Enable USB Mass Storage (UMS)
CONFIG_CMD_USB_MASS_STORAGE=y

# Save environment to a fixed position on MMC (SD Card)
CONFIG_ENV_IS_IN_MMC=y
CONFIG_SYS_MMC_ENV_DEV=1
# Offset at 7MB (before the U-Boot and Trust, before partition 1)
CONFIG_ENV_OFFSET=0x700000
CONFIG_ENV_SIZE=0x8000

# Set default boot command to load from your Yocto ext4 rootfs `/boot` directory
# Assuming the rootfs partition will be partition 2 (partition 1 could be FAT or just partition 1 if no FAT).
# Adjust mmc 1:1 vs 1:2 based on final partitioning scheme.
CONFIG_BOOTCOMMAND="ext4load mmc 1:1 ${kernel_addr_r} /boot/Image; ext4load mmc 1:1 ${fdt_addr_r} /boot/devtree.dtb; booti ${kernel_addr_r} - ${fdt_addr_r}"
