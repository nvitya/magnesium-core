# Base on poky defaults
require conf/distro/poky.conf

DISTRO = "magnesium"
DISTRO_NAME = "Magnesium Embedded Linux"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "magnesium"

require ../../version-magnesium.inc

# Development-friendly features
DISTRO_FEATURES:append = " ipv4 largefile"

# Init system – keep simple for bring-up
INIT_MANAGER = "sysvinit"

VIRTUAL-RUNTIME_init_manager = "busybox"
VIRTUAL-RUNTIME_initscripts = "initscripts"

# udev/eudev is required
VIRTUAL-RUNTIME_dev_manager = "udev"

# Toolchain / build behavior
SDK_NAME = "magnesium-sdk"
TCLIBC = "glibc"

# Package format (small + simple)
PACKAGE_CLASSES = "package_ipk"

# Remove unneeded/conflicting features
DISTRO_FEATURES:remove = " \
    qt \
    alsa \
    pulseaudio \
    bluetooth \
    nfc \
    3g \
    directfb \
    pam \
    x11 \
    wayland \
    opengl \
    vulkan \
    opencl \
    pam \
    polkit \
    gobject-introspection-data \
    api-documentation \
    keyboard \
"
